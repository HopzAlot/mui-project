<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1f3c88" opacity="0.1"/>
  
  <!-- Cooking pot -->
  <path d="M 60 140 L 60 80 Q 60 60 80 60 L 120 60 Q 140 60 140 80 L 140 140 Z" 
        fill="none" stroke="#d97706" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Pot handle -->
  <path d="M 50 100 Q 30 100 30 120" 
        fill="none" stroke="#d97706" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Steam -->
  <path d="M 75 55 Q 75 35 75 25" 
        fill="none" stroke="#1f3c88" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <path d="M 100 55 Q 100 35 100 25" 
        fill="none" stroke="#1f3c88" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <path d="M 125 55 Q 125 35 125 25" 
        fill="none" stroke="#1f3c88" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Spoon inside pot -->
  <line x1="95" y1="70" x2="90" y2="120" stroke="#d97706" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <circle cx="90" cy="125" r="3" fill="#d97706" opacity="0.6"/>
  
  <!-- Gradient overlay for depth -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#grad)" stroke-width="2" opacity="0.3"/>
  
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f3c88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>